name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies
        run: pesde install

      - name: Build rbxm
        run: argon build -o Fem.rbxm

      - name: Upload rbxm to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Fem.rbxm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies
        run: pesde install

      - name: Login to Pesde
        run: pesde auth login --token "${{ secrets.PESDE_TOKEN }}"

      - name: Publish
        run: pesde publish -y
        env:
          PESDE_TOKEN: ${{ secrets.PESDE_TOKEN }}
